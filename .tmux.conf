# --- 核心设置 (Core Settings) ---
# 前缀键改为 C-x (Emacs Style)
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# --- Emacs 兼容模式 ---
# 连按两次 C-x 将前缀发送给内部应用 (Emacs)
# 这样:
#   C-x 2 -> Tmux 分屏
#   C-x C-x s -> Emacs 保存文件
#   C-x C-x C-f -> Emacs 打开文件
bind C-x send-prefix


# 基础索引从1开始，方便手指触摸
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# 鼠标支持 (调整大小时很有用)
set -g mouse on

# 减少 ESC 延迟 (对 Vim/Emacs 用户很重要)
set -sg escape-time 10

# --- 性能与体验优化 (Optimization) ---
set -s focus-events on      # 让 Neovim/Emacs 感知焦点变化 (autoread)
set -sg repeat-time 300     # 允许按键连发 (如调整大小时)
set -g detach-on-destroy off # 关闭最后一个窗口时不退出 Tmux，而是切换到其他 Session

# 增加历史记录
set -g history-limit 50000

# 256色与真彩支持
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- 按键绑定 (Keybindings) ---
# 重载配置: Prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 分屏 (保留当前路径)
bind 2 split-window -v -c "#{pane_current_path}" # Emacs C-x 2
bind 3 split-window -h -c "#{pane_current_path}" # Emacs C-x 3
unbind '"'
unbind %

# 创建新窗口 (保留当前路径)
bind c new-window -c "#{pane_current_path}"

# 面板导航 (Emacs Style: C-n/p/f/b)
# 需要配合 Prefix 键使用，例如 C-x C-n
bind C-n select-pane -D
bind C-p select-pane -U
bind C-f select-pane -R
bind C-b select-pane -L

# 窗口切换
bind -n M-p previous-window
bind -n M-n next-window

# --- 高级功能 (Advanced) ---
# 切换多窗口同步输入 (Toggle Sync)
bind C-y set -w synchronize-panes \; display "Sync mode: #{?pane_synchronized,ON,OFF}"

# 移动当前窗口位置 (Move Window)
bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window

# 快速调整面板大小 (Resize Panes) - Emacs Style (N/P/F/B)
bind -r B resize-pane -L 5
bind -r N resize-pane -D 5
bind -r P resize-pane -U 5
bind -r F resize-pane -R 5

# 将当前面板独立为新窗口 (Break Pane)
bind ! break-pane -d -n _hidden_pane \; swap-window -t -1 \; select-window -t +1

# --- 事件通知 (Activity Monitoring) ---
setw -g monitor-activity on
set -g visual-activity off  # 禁用中间的文字提示，仅保留状态栏高亮

# 移除之前的自动弹窗钩子 (恢复默认行为)
set-hook -u -g alert-activity

# 快速跳转快捷键
bind -n M-a next-window -a           # Alt + a: 跳到下一个活动窗口
bind -n M-Enter choose-tree -Zwf "#{window_activity_flag}" # Alt + Enter: 呼出活动窗口列表
bind a choose-tree -Zwf "#{window_activity_flag}"         # Prefix + a: 同样功能 (更标准)

# 复制模式 (Emacs Style)
setw -g mode-keys emacs
# 智能剪贴板适配 (Auto-detect Wayland/X11)
# 使用外部脚本处理环境检测 (copy_wrapper.sh)
bind -T copy-mode y send-keys -X copy-pipe-and-cancel "~/.tmux/copy_wrapper.sh"
bind -T copy-mode M-w send-keys -X copy-pipe-and-cancel "~/.tmux/copy_wrapper.sh"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.tmux/copy_wrapper.sh"

# 从系统剪贴板粘贴 (Prefix + ])
bind ] run-shell "~/.tmux/paste_wrapper.sh | tmux load-buffer - && tmux paste-buffer"

# --- 插件管理 (Plugins) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect' # 保存会话
set -g @plugin 'tmux-plugins/tmux-continuum' # 自动保存
set -g @plugin 'egel/tmux-gruvbox'          # Gruvbox 主题
set -g @tmux-which-key-disable-autobuild 1  # 禁用自动构建 (避免离线环境 Python 依赖问题)
set -g @plugin 'alexwforsythe/tmux-which-key' # 按键提示
set -g @tmux-which-key-trigger ' '


# --- 插件配置 ---
# Gruvbox 主题设置
set -g @tmux-gruvbox 'dark' # or 'light'

# --- 面板边框美化 (Pane Border Styling) ---
# pane-border-lines 仅在 Tmux 3.4+ 支持
if-shell -b '[ "$(tmux -V | cut -d" " -f2 | sed "s/[a-z]//g" | awk "{if (\$1 >= 3.4) print 1}")" = "1" ]' \
    "set -g pane-border-lines heavy"

set -g pane-border-status off                # 关闭顶部状态栏
set -g pane-border-style "fg=#504945"        # 不活跃面板边框
set -g pane-active-border-style "fg=#fabd2f" # 活跃面板边框

# --- 弹窗功能 (Popups) ---
# 统一增加 -b rounded 参数以实现圆角边框 (仅 Tmux 3.3+ 支持 -b 参数)
if-shell -b '[ "$(tmux -V | cut -d" " -f2 | sed "s/[a-z]//g" | awk "{if (\$1 >= 3.3) print 1}")" = "1" ]' \
    'bind C-z display-popup -E -b rounded -w 80% -h 80% ; \
     bind t display-popup -E -b rounded -w 80% -h 80% -d "#{pane_current_path}" ; \
     bind h display-popup -E -b rounded -w 80% -h 80% "btop" ; \
     bind g display-popup -E -b rounded -w 90% -h 90% -d "#{pane_current_path}" "lazygit" ; \
     bind d display-popup -E -b rounded -w 90% -h 90% -d "#{pane_current_path}" "ranger" ; \
     unbind f ; \
     bind e display-popup -E -b rounded -w 90% -h 90% -d "#{pane_current_path}" "nvim" ; \
     bind C display-popup -E -b rounded -w 90% -h 90% "nvim ~/.tmux.conf"' \
    'bind C-z display-popup -E -w 80% -h 80% ; \
     bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}" ; \
     bind h display-popup -E -w 80% -h 80% "btop" ; \
     bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit" ; \
     bind d display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "ranger" ; \
     unbind f ; \
     bind e display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "nvim" ; \
     bind C display-popup -E -w 90% -h 90% "nvim ~/.tmux.conf"'

# 自动恢复/保存配置
set -g @continuum-restore 'on'

# --- 快速索引导航 (Index Navigation) ---
# Alt + 1..9: 直接切换窗口 (Window) - 最快的方法
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Emacs 风格面板管理 (Emacs-style Pane Management) ---
# 1. 经典跳转与关闭
bind o select-pane -t :.+                # C-x o: 切换到下一个面板 (Other Window)
bind 0 kill-pane                         # C-x 0: 关闭当前面板 (Delete Window)
bind 1 resize-pane -Z                    # C-x 1: 最大化当前面板 (Delete Other Windows / Zoom)

# 2. 解决“顺手跳转到2号面板”的问题
# 使用 Alt + q 呼出面板编号，随后按数字 (1, 2, 3...) 即可跳转
bind -n M-q display-panes

# 3. 方向键导航 (保持原有的 C-n/p/f/b 逻辑)
bind C-n select-pane -D
bind C-p select-pane -U
bind C-f select-pane -R
bind C-b select-pane -L

# 循环切换 Pane (Alt + o)
bind -n M-o select-pane -t :.+

# --- 自动安装插件管理器 (Auto-install TPM) ---
# 如果找不到 TPM，则自动克隆并安装所有插件
if-shell "test ! -d ~/.tmux/plugins/tpm" \
   "run -b 'git clone --depth 1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm > /dev/null 2>&1 && ~/.tmux/plugins/tpm/bin/install_plugins > /dev/null 2>&1'"

# 初始化 TPM (必须放在最后)
run '~/.tmux/plugins/tpm/tpm'
