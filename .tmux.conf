# --- 核心设置 (Core Settings) ---
# 前缀键改为 C-x (Emacs Style)
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# --- Emacs 兼容模式 ---
# 连按两次 C-x 将前缀发送给内部应用 (Emacs)
# 这样:
#   C-x 2 -> Tmux 分屏
#   C-x C-x s -> Emacs 保存文件
#   C-x C-x C-f -> Emacs 打开文件
bind C-x send-prefix


# 基础索引从1开始，方便手指触摸
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# 鼠标支持 (调整大小时很有用)
set -g mouse on

# 减少 ESC 延迟 (对 Vim/Emacs 用户很重要)
set -sg escape-time 10

# --- 性能与体验优化 (Optimization) ---
set -s focus-events on      # 让 Neovim/Emacs 感知焦点变化 (autoread)
set -sg repeat-time 300     # 允许按键连发 (如调整大小时)
set -g detach-on-destroy off # 关闭最后一个窗口时不退出 Tmux，而是切换到其他 Session

# 增加历史记录
set -g history-limit 50000

# 256色与真彩支持
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- 按键绑定 (Keybindings) ---
# 重载配置: Prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 分屏 (保留当前路径)
bind 2 split-window -v -c "#{pane_current_path}" # Emacs C-x 2
bind 3 split-window -h -c "#{pane_current_path}" # Emacs C-x 3
unbind '"'
unbind %

# 创建新窗口 (保留当前路径)
bind c new-window -c "#{pane_current_path}"

# 面板导航 (Emacs Style: C-n/p/f/b)
# 需要配合 Prefix 键使用，例如 C-x C-n
bind C-n select-pane -D
bind C-p select-pane -U
bind C-f select-pane -R
bind C-b select-pane -L

# 窗口切换
bind -n M-p previous-window
bind -n M-n next-window
bind -n M-q display-panes
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- 高级功能 (Advanced) ---
# 切换多窗口同步输入 (Toggle Sync)
bind C-y set -w synchronize-panes \; display "Sync mode: #{?pane_synchronized,ON,OFF}"

# 移动当前窗口位置 (Move Window)
bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window

# 快速调整面板大小 (Resize Panes) - Emacs Style (N/P/F/B)
bind -r B resize-pane -L 5
bind -r N resize-pane -D 5
bind -r P resize-pane -U 5
bind -r F resize-pane -R 5

# 动态调整 Pane 大小 (Auto Resize on Focus)
# 当光标进入某个 pane 时，自动将其放大至 65% 的宽高 (仅在存在多个面板时执行，避免单面板时报错 "no current client" 或 "not current")
set-hook -g pane-focus-in "if-shell -F '#{e|>:#{window_panes},1}' 'resize-pane -x 65% -y 65%'"


# 将当前面板独立为新窗口 (Break Pane) / 重新拉回面板 (Join Pane)
bind ! break-pane -d \; swap-window -t -1 \; select-window -t +1
bind j command-prompt -p "Join pane from window:" "join-pane -s '%%'"
bind @ join-pane -s !

# --- 事件通知 (Activity Monitoring) ---
setw -g monitor-activity on
set -g visual-activity off  # 禁用中间的文字提示，仅保留状态栏高亮

# 移除之前的自动弹窗钩子 (恢复默认行为)
set-hook -u -g alert-activity

# 快速跳转快捷键
bind -n M-a next-window -a           # Alt + a: 跳到下一个活动窗口
bind -n M-Enter choose-tree -Zwf "#{window_activity_flag}" # Alt + Enter: 呼出活动窗口列表
bind a choose-tree -Zwf "#{window_activity_flag}"         # Prefix + a: 同样功能 (更标准)

# 复制模式 (Emacs Style)
setw -g mode-keys emacs
# 智能剪贴板适配 (Auto-detect Wayland/X11)
# 使用外部脚本处理环境检测 (copy_wrapper.sh)
bind -T copy-mode y send-keys -X copy-pipe-and-cancel "~/.tmux/copy_wrapper.sh"
bind -T copy-mode M-w send-keys -X copy-pipe-and-cancel "~/.tmux/copy_wrapper.sh"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.tmux/copy_wrapper.sh"

# 从系统剪贴板粘贴 (Prefix + ])
bind ] run-shell "~/.tmux/paste_wrapper.sh | tmux load-buffer - && tmux paste-buffer"

# --- 插件管理 (Plugins) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # 保存会话
set -g @plugin 'tmux-plugins/tmux-continuum'   # 自动保存
set -g @plugin 'tmux-plugins/tmux-cpu'         # CPU 状态
set -g @plugin 'tmux-plugins/tmux-battery'     # 电池状态
set -g @tmux-which-key-disable-autobuild 1    
set -g @plugin 'alexwforsythe/tmux-which-key' 
set -g @tmux-which-key-trigger ' '

# --- 插件配置 (Oh-My-Tmux 界面重构版 - Harmonia 色彩配置) ---

# 1. 基础颜色与排版
set -g status-style "bg=#0b1c2c,fg=#cbd6e2"
set -g status-left-length 100
set -g status-right-length 150
set -g status-justify left

# 2. 左侧：Session (Oh-My-Tmux 特色：动态 Prefix 指示器与 Powerline 箭头)
# Prefix 未按下时：蓝底。按下时：黄底。
set -g status-left "#{?client_prefix,#[bg=#e5cb7b]#[fg=#0b1c2c] ⌨ ,#[bg=#568bbf]#[fg=#0b1c2c] ❐ } #[bold]#S #{?client_prefix,#[fg=#e5cb7b]#[bg=#0b1c2c],#[fg=#568bbf]#[bg=#0b1c2c]} "

# 3. 中间：窗口列表 (Oh-My-Tmux 经典排版，缩小了间隔)
# 强制自动将窗口名转为大写，解决部分字体中小写字母下沉导致与状态栏框体不对齐的问题
setw -g automatic-rename-format "#(echo '#{pane_current_command}' | tr 'a-z' 'A-Z')"
set -g window-status-separator ""
setw -g window-status-format "#[fg=#cbd6e2,bg=#0b1c2c] #I  #W "
setw -g window-status-current-format "#[fg=#0b1c2c,bg=#e5cb7b]#[fg=#0b1c2c,bg=#e5cb7b,bold] #I  #W #[fg=#e5cb7b,bg=#0b1c2c]"

# 4. 右侧：系统状态 (连续 Powerline 风格，保留文字标签避免截断)
set -g status-right ""
# CPU 模块
set -ag status-right "#[fg=#223b54,bg=#0b1c2c]#[fg=#cbd6e2,bg=#223b54] CPU #{cpu_percentage} "
# 电池模块
set -ag status-right "#[fg=#405c79,bg=#223b54]#[fg=#cbd6e2,bg=#405c79] BAT #{battery_percentage} "
# 时间模块
set -ag status-right "#[fg=#568bbf,bg=#405c79]#[fg=#0b1c2c,bg=#568bbf,bold] %b %d日 %H:%M "

# 2. 插件功能配置
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# --- 面板边框美化 ---
set -g pane-border-style "fg=#405c79"
set -g pane-active-border-style "fg=#568bbf"

# 3. 初始化 TPM (必须放在最后)
run '~/.tmux/plugins/tpm/tpm'

# --- 终端透传 (Passthrough for Yazi) ---
set -s allow-passthrough on
set -g extended-keys on